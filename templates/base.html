<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RAI1 ASO Targets{% endblock %} — SMS Research Portal</title>
  <link rel="stylesheet" href="{% block css_path %}css/styles.css{% endblock %}">

</head>
<body>
  <nav>
    <div class="container">
      <a href="{% block nav_prefix %}{% endblock %}index.html" class="logo">RAI1 <span>ASO Targets</span></a>
      <a href="{% block np %}{% endblock %}index.html" {% block nav_home %}{% endblock %}>Dashboard</a>
      <a href="{% block np3 %}{% endblock %}methodology.html" {% block nav_method %}{% endblock %}>Methodology</a>
      <a href="{% block np4 %}{% endblock %}about.html" {% block nav_about %}{% endblock %}>About</a>
      <a href="{% block np5 %}{% endblock %}compare.html" {% block nav_compare %}{% endblock %}>Compare</a>
    </div>
  </nav>

  {% block header %}{% endblock %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="container">
      Data generated by <a href="https://github.com/filipsebesta1/sms-aso-targets">smsresearch pipeline</a>.
      Sources: <a href="https://rest.ensembl.org">Ensembl</a>,
      <a href="https://genome.ucsc.edu">UCSC</a>,
      <a href="https://www.proteinatlas.org">HPA</a>,
      <a href="https://gtexportal.org">GTEx</a>,
      <a href="https://gwips.ucc.ie">GWIPS-viz</a>.
      All coordinates GRCh38/hg38.
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
